name: Bug Report
description: Report a bug in ringq
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code example or steps to reproduce the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened (include traceback if applicable).
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ringq version
      description: Output of `python -c "import ringq; print(ringq.__version__)"`.
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      description: e.g. Ubuntu 22.04, macOS 14, Windows 11
    validations:
      required: false
